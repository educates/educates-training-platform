#@ load("@ytt:data", "data")

#@ session_manager_cluster_roles = ["cluster-admin"]
#@ if hasattr(data.values, "sessionManager") and data.values.sessionManager != None and hasattr(data.values.sessionManager, "clusterRoles") and data.values.sessionManager.clusterRoles != []:
#@ session_manager_cluster_roles = data.values.sessionManager.clusterRoles
#@ end

#@ for cluster_role in session_manager_cluster_roles:
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: #@ "{}-session-manager:{}".format(data.values.operator.namePrefix, cluster_role)
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: #@ cluster_role
subjects:
- kind: ServiceAccount
  name: session-manager
  namespace: #@ data.values.operator.namespace
#@ end

#@ if data.values.clusterSecurity.policyEngine == "pod-security-policies":
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: #@ "{}-session-manager-psp".format(data.values.operator.namePrefix)
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: #@ "{}-baseline-psp".format(data.values.operator.namePrefix)
subjects:
- kind: ServiceAccount
  name: session-manager
  namespace: #@ data.values.operator.namespace

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: #@ "{}-image-puller-psp".format(data.values.operator.namePrefix)
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: #@ "{}-baseline-psp".format(data.values.operator.namePrefix)
subjects:
- kind: ServiceAccount
  name: image-puller
  namespace: #@ data.values.operator.namespace
#@ end

#@ if data.values.clusterSecurity.policyEngine == "security-context-constraints":
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: #@ "{}-session-manager-scc".format(data.values.operator.namePrefix)
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: #@ "{}-baseline-scc".format(data.values.operator.namePrefix)
subjects:
- kind: ServiceAccount
  name: session-manager
  namespace: #@ data.values.operator.namespace

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: #@ "{}-image-puller-scc".format(data.values.operator.namePrefix)
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: #@ "{}-baseline-scc".format(data.values.operator.namePrefix)
subjects:
- kind: ServiceAccount
  name: image-puller
  namespace: #@ data.values.operator.namespace
#@ end
