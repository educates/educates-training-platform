apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: secretexporters.secrets.educates.dev
spec:
  scope: Namespaced
  group: secrets.educates.dev
  names:
    plural: secretexporters
    singular: secretexporter
    kind: SecretExporter
    categories:
    - "educates-secrets"
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                rules:
                  type: array
                  items:
                    type: object
                    required: [targetNamespaces]
                    properties:
                      targetNamespaces:
                        type: object
                        properties:
                          nameSelector:
                            type: object
                            required: [matchNames]
                            properties:
                              matchNames: { type: array, items: { type: string } }
                          uidSelector:
                            type: object
                            required: [matchUIDs]
                            properties:
                              matchUIDs: { type: array, items: { type: string } }
                          ownerSelector:
                            type: object
                            required: [matchOwners]
                            properties:
                              matchOwners:
                                type: array
                                items:
                                  type: object
                                  required: [apiVersion, kind, name, uid]
                                  properties:
                                    apiVersion: { type: string }
                                    kind: { type: string }
                                    name: { type: string }
                                    uid: { type: string }
                          labelSelector: { type: object }
                      targetSecret:
                        type: object
                        properties:
                          name: { type: string }
                          labels: { type: object }
                      copyAuthorization:
                        type: object
                        required: [sharedSecret]
                        properties:
                          sharedSecret: { type: string }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
