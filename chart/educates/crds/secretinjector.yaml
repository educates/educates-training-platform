apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: secretinjectors.secrets.educates.dev
spec:
  scope: Cluster
  group: secrets.educates.dev
  names:
    plural: secretinjectors
    singular: secretinjector
    kind: SecretInjector
    categories:
    - "educates-secrets"
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                rules:
                  type: array
                  items:
                    type: object
                    required: [sourceSecrets]
                    properties:
                      targetNamespaces:
                        type: object
                        properties:
                          nameSelector:
                            type: object
                            required: [matchNames]
                            properties:
                              matchNames: { type: array, items: { type: string } }
                          uidSelector:
                            type: object
                            required: [matchUIDs]
                            properties:
                              matchUIDs: { type: array, items: { type: string } }
                          labelSelector:
                            type: object
                            properties:
                              matchLabels: { type: object }
                              matchExpressions: { type: array }
                      sourceSecrets:
                        type: object
                        properties:
                          nameSelector:
                            type: object
                            required: [matchNames]
                            properties:
                              matchNames: { type: array, items: { type: string } }
                          labelSelector: { type: object }
                      serviceAccounts:
                        type: object
                        properties:
                          nameSelector:
                            type: object
                            required: [matchNames]
                            properties:
                              matchNames: { type: array, items: { type: string } }
                          labelSelector: { type: object }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
