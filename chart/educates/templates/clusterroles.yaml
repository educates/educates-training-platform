{{- if eq .Values.clusterSecurity.policyEngine "pod-security-policies" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: educates-privileged-psp
rules:
  - apiGroups: [policy]
    resources: [podsecuritypolicies]
    verbs: [use]
    resourceNames: [aaa-educates-privileged]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: educates-baseline-psp
rules:
  - apiGroups: [policy]
    resources: [podsecuritypolicies]
    verbs: [use]
    resourceNames: [aaa-educates-baseline]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: educates-restricted-psp
rules:
  - apiGroups: [policy]
    resources: [podsecuritypolicies]
    verbs: [use]
    resourceNames: [aaa-educates-restricted]
{{- end }}
{{- if eq .Values.clusterSecurity.policyEngine "security-context-constraints" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: educates-privileged-scc
rules:
  - apiGroups: [security.openshift.io]
    resources: [securitycontextconstraints]
    verbs: [use]
    resourceNames: [educates-privileged]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: educates-baseline-scc
rules:
  - apiGroups: [security.openshift.io]
    resources: [securitycontextconstraints]
    verbs: [use]
    resourceNames: [educates-baseline]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: educates-restricted-scc
rules:
  - apiGroups: [security.openshift.io]
    resources: [securitycontextconstraints]
    verbs: [use]
    resourceNames: [educates-restricted]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: educates-session-manager
aggregationRule:
  clusterRoleSelectors:
  - matchLabels:
      rbac.educates.dev/extends-workshop-permissions: "true"
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: educates-session-manager:core
  labels:
    rbac.educates.dev/extends-workshop-permissions: "true"
rules:
  - apiGroups: [""]
    resources: [namespaces, limitranges, resourcequotas]
    verbs: ["*"]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterroles, clusterrolebindings]
    verbs: ["*"]
  - apiGroups: [training.educates.dev]
    resources: [workshops, workshopsessions, trainingportals, workshopenvironments, workshopallocations, workshoprequests]
    verbs: ["*"]
  - apiGroups: [secrets.educates.dev]
    resources: [secretcopiers]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: educates-secrets-manager
rules:
  - apiGroups: [""]
    resources: [events, secrets, namespaces, serviceaccounts]
    verbs: [create, get, list, watch, delete, deletecollection, patch, update]
  - apiGroups: [secrets.educates.dev]
    resources: [secretcopiers, secretexporters, secretimporters, secretinjectors]
    verbs: [get, list, watch, patch, update]
  - apiGroups: [secrets.educates.dev]
    resources: [secretcopiers/finalizers, secretimporters/finalizers]
    verbs: [update]
---
# view-session-role, edit-session-role, admin-session-role (abbreviated for chart size; full RBAC in ytt package)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: educates-view-session-role
rules:
  - apiGroups: [""]
    resources: [configmaps, endpoints, persistentvolumeclaims, persistentvolumeclaims/status, pods, replicationcontrollers, replicationcontrollers/scale, serviceaccounts, services, services/status, bindings, events, limitranges, namespaces/status, pods/log, pods/status, replicationcontrollers/status, resourcequotas, resourcequotas/status, namespaces]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [controllerrevisions, daemonsets, daemonsets/status, deployments, deployments/scale, deployments/status, replicasets, replicasets/scale, replicasets/status, statefulsets, statefulsets/scale, statefulsets/status]
    verbs: [get, list, watch]
  - apiGroups: [autoscaling, batch, policy, networking.k8s.io]
    resources: [horizontalpodautoscalers, horizontalpodautoscalers/status, cronjobs, cronjobs/status, jobs, jobs/status, poddisruptionbudgets, poddisruptionbudgets/status, ingresses, ingresses/status]
    verbs: [get, list, watch]
  - apiGroups: [extensions]
    resources: [daemonsets, daemonsets/status, deployments, deployments/scale, deployments/status, ingresses, ingresses/status, replicasets, replicasets/scale, replicasets/status, replicationcontrollers/scale]
    verbs: [get, list, watch]
---
