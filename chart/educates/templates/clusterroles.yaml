apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: educates-training-portal
rules:
  - apiGroups: [""]
    resources: [namespaces]
    resourceNames: [default]
    verbs: [get]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch, create]
  - apiGroups: [training.educates.dev]
    resources: [workshops, workshopenvironments, workshopsessions, workshopallocations, trainingportals]
    verbs: [get, list, watch]
  - apiGroups: [training.educates.dev]
    resources: [trainingportals/finalizers, workshopenvironments/finalizers, workshopsessions/finalizers]
    verbs: [update]
