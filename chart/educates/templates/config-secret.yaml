# Config secret consumed by session-manager and secrets-manager.
# The operator expects educates-operator-config.yaml (full config) and optionally kyverno-policies.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: educates-config
  namespace: {{ include "educates.operator.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "educates.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  educates-operator-config.yaml: |
    {{- .Values | toYaml | nindent 4 }}
  kyverno-policies.yaml: {{ .Values.clusterSecurity.kyvernoPolicies | default "[]" | quote }}
