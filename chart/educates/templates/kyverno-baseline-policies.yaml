{{- if eq .Values.clusterSecurity.policyEngine "kyverno" }}
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: educates-baseline-disallow-capabilities
  annotations:
    policies.kyverno.io/title: Disallow Capabilities in CEL expressions
    policies.kyverno.io/category: Pod Security Standards (Baseline) in CEL
    policies.kyverno.io/severity: medium
    policies.kyverno.io/minversion: 1.11.0
    kyverno.io/kubernetes-version: "1.26-1.27"
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Adding capabilities beyond those listed in the policy must be disallowed.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: adding-capabilities
      match:
        any:
        - resources:
            kinds:
              - Pod
            operations:
            - CREATE
            - UPDATE
            namespaceSelector:
              matchExpressions:
              - key: {{ printf "training.%s/policy.engine" "educates.dev" }}
                operator: In
                values:
                - kyverno
              - key: {{ printf "training.%s/policy.name" "educates.dev" }}
                operator: In
                values:
                - baseline
                - restricted
      validate:
        cel:
          variables:
            - name: allowedCapabilities
              expression: "['AUDIT_WRITE','CHOWN','DAC_OVERRIDE','FOWNER','FSETID','KILL','MKNOD','NET_BIND_SERVICE','SETFCAP','SETGID','SETPCAP','SETUID','SYS_CHROOT']"
            - name: allContainers
              expression: "(object.spec.containers + (has(object.spec.initContainers) ? object.spec.initContainers : []) + (has(object.spec.ephemeralContainers) ? object.spec.ephemeralContainers : []))"
          expressions:
            - expression: >-
                variables.allContainers.all(container,
                container.?securityContext.?capabilities.?add.orValue([]).all(capability, capability == '' ||
                capability in variables.allowedCapabilities))
              message: >-
                Any capabilities added beyond the allowed list (AUDIT_WRITE, CHOWN, DAC_OVERRIDE, FOWNER,
                FSETID, KILL, MKNOD, NET_BIND_SERVICE, SETFCAP, SETGID, SETPCAP, SETUID, SYS_CHROOT)
                are disallowed.
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: educates-baseline-disallow-host-namespaces
  annotations:
    policies.kyverno.io/title: Disallow Host Namespaces in CEL expressions
    policies.kyverno.io/category: Pod Security Standards (Baseline) in CEL
    policies.kyverno.io/severity: medium
    policies.kyverno.io/minversion: 1.11.0
    kyverno.io/kubernetes-version: "1.26-1.27"
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Host namespaces (Process ID namespace, Inter-Process Communication namespace, and
      network namespace) allow access to shared information and can be used to elevate
      privileges. Pods should not be allowed access to host namespaces. This policy ensures
      fields which make use of these host namespaces are unset or set to `false`.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: host-namespaces
      match:
        any:
        - resources:
            kinds:
              - Pod
            operations:
            - CREATE
            - UPDATE
            namespaceSelector:
              matchExpressions:
              - key: {{ printf "training.%s/policy.engine" "educates.dev" }}
                operator: In
                values:
                - kyverno
              - key: {{ printf "training.%s/policy.name" "educates.dev" }}
                operator: In
                values:
                - baseline
                - restricted
      validate:
        cel:
          expressions:
            - expression: >-
                ( object.spec.?hostNetwork.orValue(false) == false) &&
                ( object.spec.?hostIPC.orValue(false) == false) &&
                ( object.spec.?hostPID.orValue(false) == false)
              message: >-
                Sharing the host namespaces is disallowed. The fields spec.hostNetwork,
                spec.hostIPC, and spec.hostPID must be unset or set to `false`.
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: educates-baseline-disallow-host-path
  annotations:
    policies.kyverno.io/title: Disallow hostPath in CEL expressions
    policies.kyverno.io/category: Pod Security Standards (Baseline) in CEL
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod,Volume
    policies.kyverno.io/minversion: 1.11.0
    kyverno.io/kubernetes-version: "1.26-1.27"
    policies.kyverno.io/description: >-
      HostPath volumes let Pods use host directories and volumes in containers.
      Using host resources can be used to access shared data or escalate privileges
      and should not be allowed. This policy ensures no hostPath volumes are in use.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: host-path
      match:
        any:
        - resources:
            kinds:
              - Pod
            operations:
            - CREATE
            - UPDATE
            namespaceSelector:
              matchExpressions:
              - key: {{ printf "training.%s/policy.engine" "educates.dev" }}
                operator: In
                values:
                - kyverno
              - key: {{ printf "training.%s/policy.name" "educates.dev" }}
                operator: In
                values:
                - baseline
                - restricted
      validate:
        cel:
          expressions:
            - expression: "object.spec.?volumes.orValue([]).all(volume, size(volume) == 0 || !has(volume.hostPath))"
              message: "HostPath volumes are forbidden. The field spec.volumes[*].hostPath must be unset"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: educates-baseline-disallow-host-ports
  annotations:
    policies.kyverno.io/title: Disallow hostPorts in CEL expressions
    policies.kyverno.io/category: Pod Security Standards (Baseline) in CEL
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.11.0
    kyverno.io/kubernetes-version: "1.26-1.27"
    policies.kyverno.io/description: >-
      Access to host ports allows potential snooping of network traffic and should not be
      allowed, or at minimum restricted to a known list. This policy ensures the `hostPort`
      field is unset or set to `0`.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: host-ports-none
      match:
        any:
        - resources:
            kinds:
              - Pod
            operations:
            - CREATE
            - UPDATE
            namespaceSelector:
              matchExpressions:
              - key: {{ printf "training.%s/policy.engine" "educates.dev" }}
                operator: In
                values:
                - kyverno
              - key: {{ printf "training.%s/policy.name" "educates.dev" }}
                operator: In
                values:
                - baseline
                - restricted
      validate:
        cel:
          expressions:
            - expression: >-
                object.spec.containers.all(container, !has(container.ports) ||
                container.ports.all(port, !has(port.hostPort) || port.hostPort == 0))
              message: >-
                Use of host ports is disallowed. The field spec.containers[*].ports[*].hostPort
                must either be unset or set to `0`.

            - expression: >-
                !has(object.spec.initContainers) ||
                object.spec.initContainers.all(container, !has(container.ports) ||
                container.ports.all(port, !has(port.hostPort) || port.hostPort == 0))
              message: >-
                Use of host ports is disallowed. The field spec.initContainers[*].ports[*].hostPort
                must either be unset or set to `0`.

            - expression: >-
                !has(object.spec.ephemeralContainers) ||
                object.spec.ephemeralContainers.all(container, !has(container.ports) ||
                container.ports.all(port, !has(port.hostPort) || port.hostPort == 0))
              message: >-
                Use of host ports is disallowed. The field spec.ephemeralContainers[*].ports[*].hostPort
                must either be unset or set to `0`.
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: educates-baseline-disallow-host-ports-range
  annotations:
    policies.kyverno.io/title: Disallow hostPorts Range (Alternate) in CEL expressions
    policies.kyverno.io/category: Pod Security Standards (Baseline) in CEL
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.11.0
    kyverno.io/kubernetes-version: "1.26-1.27"
    policies.kyverno.io/description: >-
      Access to host ports allows potential snooping of network traffic and should not be
      allowed, or at minimum restricted to a known list. This policy ensures the `hostPort`
      field is set to one in the designated list. Note that Kubernetes Pod Security Admission
      does not support this rule.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: host-port-range
      match:
        any:
        - resources:
            kinds:
              - Pod
            operations:
            - CREATE
            - UPDATE
            namespaceSelector:
              matchExpressions:
              - key: {{ printf "training.%s/policy.engine" "educates.dev" }}
                operator: In
                values:
                - kyverno
              - key: {{ printf "training.%s/policy.name" "educates.dev" }}
                operator: In
                values:
                - baseline
                - restricted
      validate:
        cel:
          variables:
            - name: allContainers
              expression: >-
               object.spec.containers +
               object.spec.?initContainers.orValue([]) +
               object.spec.?ephemeralContainers.orValue([])
          expressions:
            - expression: >-
                variables.allContainers.all(container,
                container.?ports.orValue([]).all(port,
                size(port) == 0 ||
                !has(port.hostPort) || (port.hostPort >= 5000 && port.hostPort <= 6000) ))
              message: >-
                The only permitted hostPorts are in the range 5000-6000.
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: educates-baseline-disallow-host-process
  annotations:
    policies.kyverno.io/title: Disallow hostProcess in CEL expressions
    policies.kyverno.io/category: Pod Security Standards (Baseline) in CEL
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.11.0
    kyverno.io/kubernetes-version: "1.26-1.27"
    policies.kyverno.io/description: >-
      Windows pods offer the ability to run HostProcess containers which enables privileged
      access to the Windows node. Privileged access to the host is disallowed in the baseline
      policy. HostProcess pods are an alpha feature as of Kubernetes v1.22. This policy ensures
      the `hostProcess` field, if present, is set to `false`.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: host-process-containers
      match:
        any:
        - resources:
            kinds:
              - Pod
            operations:
            - CREATE
            - UPDATE
            namespaceSelector:
              matchExpressions:
              - key: {{ printf "training.%s/policy.engine" "educates.dev" }}
                operator: In
                values:
                - kyverno
              - key: {{ printf "training.%s/policy.name" "educates.dev" }}
                operator: In
                values:
                - baseline
                - restricted
      validate:
        cel:
          variables:
            - name: allContainers
              expression: "(object.spec.containers + (has(object.spec.initContainers) ? object.spec.initContainers : []) + (has(object.spec.ephemeralContainers) ? object.spec.ephemeralContainers : []))"
          expressions:
            - expression: >-
                variables.allContainers.all(container,
                container.?securityContext.?windowsOptions.?hostProcess.orValue(false) == false)
              message: >-
                HostProcess containers are disallowed. The field spec.containers[*].securityContext.windowsOptions.hostProcess,
                spec.initContainers[*].securityContext.windowsOptions.hostProcess, and
                spec.ephemeralContainers[*].securityContext.windowsOptions.hostProcess
                must either be undefined or set to `false`.
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: educates-baseline-disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers in CEL expressions
    policies.kyverno.io/category: Pod Security Standards (Baseline) in CEL
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.11.0
    kyverno.io/kyverno-version: 1.11.0
    kyverno.io/kubernetes-version: "1.26-1.27"
    policies.kyverno.io/description: >-
      Privileged mode disables most security mechanisms and must not be allowed. This policy
      ensures Pods do not call for privileged mode.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: privileged-containers
      match:
        any:
        - resources:
            kinds:
              - Pod
            operations:
            - CREATE
            - UPDATE
            namespaceSelector:
              matchExpressions:
              - key: {{ printf "training.%s/policy.engine" "educates.dev" }}
                operator: In
                values:
                - kyverno
              - key: {{ printf "training.%s/policy.name" "educates.dev" }}
                operator: In
                values:
                - baseline
                - restricted
      validate:
        cel:
          variables:
            - name: allContainers
              expression: "(object.spec.containers + (has(object.spec.initContainers) ? object.spec.initContainers : []) + (has(object.spec.ephemeralContainers) ? object.spec.ephemeralContainers : []))"
          expressions:
            - expression: "variables.allContainers.all(container, container.?securityContext.?privileged.orValue(false) == false)"
              message: "Privileged mode is disallowed. All containers must set the securityContext.privileged field to `false` or unset the field."
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: educates-baseline-disallow-proc-mount
  annotations:
    policies.kyverno.io/title: Disallow procMount in CEL expressions
    policies.kyverno.io/category: Pod Security Standards (Baseline) in CEL
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.11.0
    kyverno.io/kyverno-version: 1.11.0
    kyverno.io/kubernetes-version: "1.26-1.27"
    policies.kyverno.io/description: >-
      The default /proc masks are set up to reduce attack surface and should be required. This policy
      ensures nothing but the default procMount can be specified. Note that in order for users
      to deviate from the `Default` procMount requires setting a feature gate at the API
      server.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-proc-mount
      match:
        any:
        - resources:
            kinds:
              - Pod
            operations:
            - CREATE
            - UPDATE
            namespaceSelector:
              matchExpressions:
              - key: {{ printf "training.%s/policy.engine" "educates.dev" }}
                operator: In
                values:
                - kyverno
              - key: {{ printf "training.%s/policy.name" "educates.dev" }}
                operator: In
                values:
                - baseline
                - restricted
      validate:
        cel:
          variables:
            - name: allContainers
              expression: "(object.spec.containers + (has(object.spec.initContainers) ? object.spec.initContainers : []) + (has(object.spec.ephemeralContainers) ? object.spec.ephemeralContainers : []))"
          expressions:
            - expression: "variables.allContainers.all(container, container.?securityContext.?procMount.orValue('Default') == 'Default')"
              message: "Changing the proc mount from the default is not allowed."
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: educates-baseline-disallow-selinux
  annotations:
    policies.kyverno.io/title: Disallow SELinux in CEL expressions
    policies.kyverno.io/category: Pod Security Standards (Baseline) in CEL
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.11.0
    kyverno.io/kyverno-version: 1.11.0
    kyverno.io/kubernetes-version: "1.26-1.27"
    policies.kyverno.io/description: >-
      SELinux options can be used to escalate privileges and should not be allowed. This policy
      ensures that the `seLinuxOptions` field is undefined.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: selinux-type
      match:
        any:
        - resources:
            kinds:
              - Pod
            operations:
            - CREATE
            - UPDATE
            namespaceSelector:
              matchExpressions:
              - key: {{ printf "training.%s/policy.engine" "educates.dev" }}
                operator: In
                values:
                - kyverno
              - key: {{ printf "training.%s/policy.name" "educates.dev" }}
                operator: In
                values:
                - baseline
                - restricted
      validate:
        cel:
          variables:
            - name: allContainerTypes
              expression: "(object.spec.containers + (has(object.spec.initContainers) ? object.spec.initContainers : []) + (has(object.spec.ephemeralContainers) ? object.spec.ephemeralContainers : []))"
            - name: seLinuxTypes
              expression: "['container_t', 'container_init_t', 'container_kvm_t']"
          expressions:
            - expression: >-
                (!has(object.spec.securityContext) ||
                !has(object.spec.securityContext.seLinuxOptions) ||
                !has(object.spec.securityContext.seLinuxOptions.type) ||
                variables.seLinuxTypes.exists(type, type == object.spec.securityContext.seLinuxOptions.type)) &&
                variables.allContainerTypes.all(container,
                !has(container.securityContext) ||
                !has(container.securityContext.seLinuxOptions) ||
                !has(container.securityContext.seLinuxOptions.type) ||
                variables.seLinuxTypes.exists(type, type == container.securityContext.seLinuxOptions.type))
              message: >-
                Setting the SELinux type is restricted. The field securityContext.seLinuxOptions.type must either be unset or set to one of the allowed values (container_t, container_init_t, or container_kvm_t).
    - name: selinux-user-role
      match:
        any:
        - resources:
            kinds:
              - Pod
            operations:
            - CREATE
            - UPDATE
            namespaceSelector:
              matchExpressions:
              - key: {{ printf "training.%s/policy.engine" "educates.dev" }}
                operator: In
                values:
                - kyverno
              - key: {{ printf "training.%s/policy.name" "educates.dev" }}
                operator: In
                values:
                - baseline
                - restricted
      validate:
        cel:
          variables:
            - name: allContainerTypes
              expression: "(object.spec.containers + (has(object.spec.initContainers) ? object.spec.initContainers : []) + (has(object.spec.ephemeralContainers) ? object.spec.ephemeralContainers : []))"
          expressions:
            - expression: >-
                (!has(object.spec.securityContext) ||
                !has(object.spec.securityContext.seLinuxOptions) ||
                (!has(object.spec.securityContext.seLinuxOptions.user) && !has(object.spec.securityContext.seLinuxOptions.role))) &&
                variables.allContainerTypes.all(container,
                !has(container.securityContext) ||
                !has(container.securityContext.seLinuxOptions) ||
                (!has(container.securityContext.seLinuxOptions.user) && !has(container.securityContext.seLinuxOptions.role)))
              message: >-
                Setting the SELinux user or role is forbidden. The fields seLinuxOptions.user and seLinuxOptions.role must be unset.

---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: educates-baseline-restrict-seccomp
  annotations:
    policies.kyverno.io/title: Restrict Seccomp in CEL expressions
    policies.kyverno.io/category: Pod Security Standards (Baseline) in CEL
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.11.0
    kyverno.io/kyverno-version: 1.11.0
    kyverno.io/kubernetes-version: "1.26-1.27"
    policies.kyverno.io/description: >-
      The seccomp profile must not be explicitly set to Unconfined. This policy,
      requiring Kubernetes v1.19 or later, ensures that seccomp is unset or
      set to `RuntimeDefault` or `Localhost`.
spec:
  background: true
  validationFailureAction: Enforce
  rules:
    - name: check-seccomp
      match:
        any:
        - resources:
            kinds:
              - Pod
            operations:
            - CREATE
            - UPDATE
            namespaceSelector:
              matchExpressions:
              - key: {{ printf "training.%s/policy.engine" "educates.dev" }}
                operator: In
                values:
                - kyverno
              - key: {{ printf "training.%s/policy.name" "educates.dev" }}
                operator: In
                values:
                - baseline
                - restricted
      validate:
        cel:
          variables:
            - name: allContainers
              expression: "(object.spec.containers + (has(object.spec.initContainers) ? object.spec.initContainers : []) + (has(object.spec.ephemeralContainers) ? object.spec.ephemeralContainers : []))"
            - name: allowedProfileTypes
              expression: "['RuntimeDefault', 'Localhost']"
          expressions:
            - expression: >-
                (object.spec.?securityContext.?seccompProfile.?type.orValue('Localhost')
                in variables.allowedProfileTypes) &&
                (variables.allContainers.all(container,
                container.?securityContext.?seccompProfile.?type.orValue('Localhost')
                in variables.allowedProfileTypes))
              message: >-
                Use of custom Seccomp profiles is disallowed. The field
                spec.containers[*].securityContext.seccompProfile.type must be unset or set to `RuntimeDefault` or `Localhost`.
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: educates-baseline-restrict-sysctls
  annotations:
    policies.kyverno.io/title: Restrict sysctls in CEL expressions
    policies.kyverno.io/category: Pod Security Standards (Baseline) in CEL
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.11.0
    kyverno.io/kyverno-version: 1.11.0
    kyverno.io/kubernetes-version: "1.26-1.27"
    policies.kyverno.io/description: >-
      Sysctls can disable security mechanisms or affect all containers on a
      host, and should be disallowed except for an allowed "safe" subset. A
      sysctl is considered safe if it is namespaced in the container or the
      Pod, and it is isolated from other Pods or processes on the same Node.
      This policy ensures that only those "safe" subsets can be specified in
      a Pod.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-sysctls
      match:
        any:
        - resources:
            kinds:
              - Pod
            operations:
            - CREATE
            - UPDATE
            namespaceSelector:
              matchExpressions:
              - key: {{ printf "training.%s/policy.engine" "educates.dev" }}
                operator: In
                values:
                - kyverno
              - key: {{ printf "training.%s/policy.name" "educates.dev" }}
                operator: In
                values:
                - baseline
                - restricted
      validate:
        cel:
          variables:
            - name: allowedSysctls
              expression: "['kernel.shm_rmid_forced','net.ipv4.ip_local_port_range','net.ipv4.ip_unprivileged_port_start','net.ipv4.tcp_syncookies','net.ipv4.ping_group_range']"
          expressions:
            - expression: >-
                object.spec.?securityContext.?sysctls.orValue([]).all(sysctl, sysctl == '' ||
                has(sysctl.name) && sysctl.name in variables.allowedSysctls)
              message: >-
                Setting additional sysctls above the allowed type is disallowed.
                The field spec.securityContext.sysctls must be unset or not use any other names
                than kernel.shm_rmid_forced, net.ipv4.ip_local_port_range,
                net.ipv4.ip_unprivileged_port_start, net.ipv4.tcp_syncookies and
                net.ipv4.ping_group_range.
{{- end }}
