{{- if eq .Values.clusterSecurity.policyEngine "pod-security-policies" }}

---
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: aaa-educates-privileged
  annotations:
    seccomp.security.alpha.kubernetes.io/allowedProfileNames: "*"
spec:
  privileged: true
  allowPrivilegeEscalation: true
  allowedCapabilities: ["*"]
  volumes: ["*"]
  hostNetwork: true
  hostPorts:
  - min: 0
    max: 65535
  hostIPC: true
  hostPID: true
  runAsUser: { rule: "RunAsAny" }
  seLinux: { rule: "RunAsAny" }
  supplementalGroups: { rule: "RunAsAny" }
  fsGroup: { rule: "RunAsAny" }
---
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: aaa-educates-baseline
  annotations:
    seccomp.security.alpha.kubernetes.io/allowedProfileNames: "*"
spec:
  privileged: false
  allowPrivilegeEscalation: true
  allowedCapabilities:
  - CHOWN
  - DAC_OVERRIDE
  - FSETID
  - FOWNER
  - MKNOD
  - SETGID
  - SETUID
  - SETFCAP
  - SETPCAP
  - NET_BIND_SERVICE
  - SYS_CHROOT
  - KILL
  - AUDIT_WRITE
  volumes:
  - configMap
  - emptyDir
  - projected
  - secret
  - downwardAPI
  - csi
  - persistentVolumeClaim
  - ephemeral
  - awsElasticBlockStore
  - azureDisk
  - azureFile
  - cephFS
  - cinder
  - fc
  - flexVolume
  - flocker
  - gcePersistentDisk
  - gitRepo
  - glusterfs
  - iscsi
  - nfs
  - photonPersistentDisk
  - portworxVolume
  - quobyte
  - rbd
  - scaleIO
  - storageos
  - vsphereVolume
  hostNetwork: false
  hostIPC: false
  hostPID: false
  readOnlyRootFilesystem: false
  runAsUser: { rule: "RunAsAny" }
  seLinux: { rule: "RunAsAny" }
  supplementalGroups:
    rule: MustRunAs
    ranges: [{ min: 0, max: 65535 }]
  fsGroup:
    rule: MustRunAs
    ranges: [{ min: 0, max: 65535 }]
---
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: aaa-educates-restricted
  annotations:
    seccomp.security.alpha.kubernetes.io/allowedProfileNames: "*"
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities: [ALL]
  volumes:
  - configMap
  - emptyDir
  - projected
  - secret
  - downwardAPI
  - csi
  - persistentVolumeClaim
  - ephemeral
  hostNetwork: false
  hostIPC: false
  hostPID: false
  runAsUser: { rule: "MustRunAsNonRoot" }
  seLinux: { rule: "RunAsAny" }
  supplementalGroups:
    rule: MustRunAs
    ranges: [{ min: 0, max: 65535 }]
  fsGroup:
    rule: MustRunAs
    ranges: [{ min: 0, max: 65535 }]
  readOnlyRootFilesystem: false
{{- end }}
