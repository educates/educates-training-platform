{{- if eq .Values.clusterSecurity.policyEngine "security-context-constraints" }}

---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: educates-privileged
allowHostDirVolumePlugin: true
allowHostIPC: true
allowHostNetwork: true
allowHostPID: true
allowHostPorts: true
allowPrivilegeEscalation: true
allowPrivilegedContainer: true
allowedCapabilities: ["*"]
defaultAddCapabilities: null
fsGroup: { type: RunAsAny }
readOnlyRootFilesystem: false
requiredDropCapabilities: null
runAsUser: { type: RunAsAny }
seLinuxContext: { type: RunAsAny }
seccompProfiles: ["*"]
supplementalGroups: { type: RunAsAny }
volumes: ["*"]
---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: educates-baseline
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: true
allowPrivilegedContainer: false
requiredDropCapabilities: [MKNOD]
runAsUser: { type: RunAsAny }
seccompProfiles: [runtime/default]
seLinuxContext: { type: MustRunAs }
supplementalGroups: { type: RunAsAny }
volumes: [configMap, downwardAPI, emptyDir, persistentVolumeClaim, projected, secret]
---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: educates-restricted
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
requiredDropCapabilities: [KILL, MKNOD, SETUID, SETGID]
runAsUser: { type: MustRunAsNonRoot }
seccompProfiles: [runtime/default]
seLinuxContext: { type: MustRunAs }
supplementalGroups: { type: RunAsAny }
volumes: [configMap, downwardAPI, emptyDir, persistentVolumeClaim, projected, secret]
{{- end }}
