{{- $pullSecretNames := include "educates.imagePullSecretNames" . | fromJson -}}
{{- if $pullSecretNames }}
---
apiVersion: secrets.educates.dev/v1beta1
kind: SecretInjector
metadata:
  name: educates-image-pull-secrets
  labels:
    app.kubernetes.io/name: {{ include "educates.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  rules:
  - targetNamespaces:
      labelSelector:
        matchLabels:
          training.educates.dev/component: portal
    sourceSecrets:
      nameSelector:
        matchNames: {{ $pullSecretNames | toJson }}
    serviceAccounts:
      labelSelector:
        matchLabels:
          training.educates.dev/component: portal
  - targetNamespaces:
      labelSelector:
        matchLabels:
          training.educates.dev/component: environment
    sourceSecrets:
      nameSelector:
        matchNames: {{ $pullSecretNames | toJson }}
    serviceAccounts:
      labelSelector:
        matchLabels:
          training.educates.dev/component: environment
  - targetNamespaces:
      labelSelector:
        matchLabels:
          training.educates.dev/component: environment
    sourceSecrets:
      nameSelector:
        matchNames: {{ $pullSecretNames | toJson }}
    serviceAccounts:
      labelSelector:
        matchLabels:
          training.educates.dev/component: session
{{- end }}

---
apiVersion: secrets.educates.dev/v1beta1
kind: SecretInjector
metadata:
  name: educates-registry-credentials
  labels:
    app.kubernetes.io/name: {{ include "educates.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  rules:
  - targetNamespaces:
      labelSelector:
        matchLabels:
          training.educates.dev/component: session
    sourceSecrets:
      nameSelector:
        matchNames:
        - educates-registry-credentials
    serviceAccounts:
      nameSelector:
        matchNames:
        - default
