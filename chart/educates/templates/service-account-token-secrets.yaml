# Service account token secrets for session-manager and secrets-manager (required on Kubernetes 1.24+).
apiVersion: v1
kind: Secret
metadata:
  name: session-manager-token
  namespace: {{ include "educates.operator.namespace" . }}
  annotations:
    kubernetes.io/service-account.name: "session-manager"
  labels:
    app.kubernetes.io/name: {{ include "educates.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: kubernetes.io/service-account-token
---
apiVersion: v1
kind: Secret
metadata:
  name: secrets-manager-token
  namespace: {{ include "educates.operator.namespace" . }}
  annotations:
    kubernetes.io/service-account.name: "secrets-manager"
  labels:
    app.kubernetes.io/name: {{ include "educates.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: kubernetes.io/service-account-token
