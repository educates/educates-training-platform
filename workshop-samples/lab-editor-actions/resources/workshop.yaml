apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-editor-actions
spec:
  title: Editor Clickable Actions Test
  description: Test workshop for verifying all editor clickable action types including open file, create file, append lines, prepend lines, insert lines before/after line, append lines after line, insert lines before/after match, select matching text, replace text selection, delete text selection, insert/append lines around selection, replace matching text, delete lines in range, delete matching lines, replace lines in range, copy file, rename file, close file, delete file, YAML operations, execute command, and terminal operations.
  duration: 15m
  difficulty: beginner
  publish:
    image: "$(image_repository)/lab-editor-actions-files:$(workshop_version)"
  workshop:
    files:
    - image:
        url: "$(image_repository)/lab-editor-actions-files:$(workshop_version)"
      includePaths:
      - /exercises/**
      - /workshop/**
      - /README.md
  session:
    namespaces:
      security:
        token:
          enabled: false
    applications:
      terminal:
        enabled: true
      editor:
        enabled: true
