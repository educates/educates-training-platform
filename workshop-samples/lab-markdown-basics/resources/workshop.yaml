apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-markdown-basics
spec:
  title: Markdown Basics Formatting Test
  description: Test workshop for verifying rendering of common markdown formatting including headings, text styles, lists, links, code blocks, tables, blockquotes, and admonition shortcodes.
  duration: 15m
  difficulty: beginner
  publish:
    image: "$(image_repository)/lab-markdown-basics-files:$(workshop_version)"
  workshop:
    files:
    - image:
        url: "$(image_repository)/lab-markdown-basics-files:$(workshop_version)"
      includePaths:
      - /workshop/**
      - /README.md
  session:
    namespaces:
      security:
        token:
          enabled: false
    applications:
      terminal:
        enabled: true
